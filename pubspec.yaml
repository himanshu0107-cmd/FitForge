name: fitforge
description: FitForge — Smart Gym & Sports Training App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Local Database
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP
  dio: ^5.4.3+1

  # UI / Charts
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Video
  video_player: ^2.8.6
  chewie: ^1.8.1

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Storage
  shared_preferences: ^2.2.3

  # Utils
  uuid: ^4.4.0
  intl: ^0.20.0
  collection: ^1.18.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.4.0
  vibration: ^2.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Icons
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/exercises.json
    - assets/programs/
    - assets/meal_plans/
    - assets/sounds/
